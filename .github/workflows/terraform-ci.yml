name: Terraform CI

on:
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Validate and Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt --check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan.txt

      - name: Post Plan as PR Comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan;
            try {
              plan = fs.readFileSync('infra/plan.txt', 'utf8');
            } catch (err) {
              plan = '(plan output not available — the terraform plan step likely failed before producing output. Check the Actions tab for the full log.)';
            }
            const max = 60000;
            const body = plan.length > max
              ? plan.slice(0, max) + '\n\n... (output truncated, see full log in Actions tab)'
              : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan\n<details><summary>Click to expand plan output</summary>\n\n\`\`\`hcl\n${body}\n\`\`\`\n\n</details>`
            });
