name: Terraform CI

# Plan-on-PR. Runs on every PR to main (no path filter) so the three required
# status checks below always report — a required check that never runs would
# block every PR. Each check is its own job so GitHub reports three distinct
# statuses ("terraform fmt", "terraform validate", "terraform plan") that the
# branch-protection ruleset on main references by exactly these names.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write # OIDC federation for the plan job (Delivery 5, Deliverable C)

defaults:
  run:
    working-directory: infra/

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: terraform fmt
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      # validate needs the providers but not the remote state, so init with no
      # backend keeps this check fast and credential-free.
      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    # dev environment has no required reviewers, so this does not gate the PR;
    # it only lets the plan read the dev-scoped DEV_DB_PASSWORD secret so the
    # PR plan matches what the dev apply will execute.
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Assemble the real Lambda packages from Dev/src before plan: archive_file
      # reads build/lambda/<fn>/ at plan time, and that dir is gitignored.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda packages
        run: bash scripts/package_lambdas.sh

      - name: Terraform Init (dev backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/dev/backend-dev.hcl

      - name: terraform plan
        id: plan
        run: |
          terraform plan -input=false -lock-timeout=120s \
            -var-file=envs/dev/dev.tfvars \
            -out=tfplan -no-color 2>&1 | tee plan.txt

      # Upload the binary plan so a human can audit exactly what would apply.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-pr-${{ github.event.pull_request.number }}
          path: infra/tfplan
          retention-days: 5

      - name: Post plan as PR comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan;
            try {
              plan = fs.readFileSync('infra/plan.txt', 'utf8');
            } catch (err) {
              plan = '(plan output not available — the terraform plan step likely failed before producing output. Check the Actions tab for the full log.)';
            }
            const max = 60000;
            const body = plan.length > max
              ? plan.slice(0, max) + '\n\n... (output truncated, see full log in Actions tab)'
              : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan (dev)\n<details><summary>Click to expand plan output</summary>\n\n\`\`\`hcl\n${body}\n\`\`\`\n\n</details>`
            });
