name: Terraform CD

# Apply-on-merge (dev) + manual staging promotion:
#   merge to main -> plan-dev -> apply-dev (auto) -> deploy frontend + smoke test
#   staging -> manual workflow_dispatch (environment=staging), reviewer-gated
# Staging is intentionally NOT promoted on push, so consecutive merges never
# queue behind an unresolved staging reviewer gate.
#
# Also exposed via workflow_dispatch with an `environment` input so the Slack
# deployment bot (Delivery 5, Deliverable J) can trigger THIS same pipeline for a
# single environment via the GitHub REST workflow_dispatch API.
on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-apply.yml"
      # The Lambda source and the SPA are packaged/deployed by this pipeline, so
      # a change to either must trigger a deploy (not just infra changes).
      - "Dev/src/**"
      - "Dev/frontend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
        default: dev

# Never let two CD runs race for the same remote state lock.
concurrency:
  group: terraform-cd-main
  cancel-in-progress: false

# OIDC federation (Delivery 5, Deliverable C): id-token lets each job mint a
# short-lived GitHub OIDC token exchanged for the CI runner role via STS. No
# long-lived AWS access keys exist in repo/environment secrets anymore.
permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: infra/

jobs:
  # ---------------------------------------------------------------------------
  # 1) Plan dev and SAVE the binary plan as an artifact. The apply job consumes
  #    this exact plan instead of re-planning, so what is reviewed is what runs.
  # ---------------------------------------------------------------------------
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    # On push: always (start of the promotion). On manual/bot dispatch: only when
    # dev was the requested environment.
    if: github.event_name == 'push' || inputs.environment == 'dev'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Assemble the real Lambda packages from Dev/src before plan (build/lambda
      # is gitignored and read by archive_file at plan time). The zips are then
      # carried to apply-dev as an artifact below.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda packages
        run: bash scripts/package_lambdas.sh

      - name: Terraform Init (dev backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/dev/backend-dev.hcl

      - name: Terraform Plan (dev)
        run: terraform plan -input=false -lock-timeout=120s -var-file=envs/dev/dev.tfvars -out=tfplan

      # Carry the plan AND the built Lambda packages so apply uploads the exact
      # bytes that were planned (apply does not re-read the archive data source).
      - name: Upload dev plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.sha }}
          path: |
            infra/tfplan
            infra/modules/compute/build/*.zip
          retention-days: 5

  # ---------------------------------------------------------------------------
  # 2) Apply dev automatically using the DOWNLOADED plan artifact (no re-plan).
  # ---------------------------------------------------------------------------
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan-dev
    if: github.event_name == 'push' || inputs.environment == 'dev'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download dev plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.sha }}
          path: infra/

      - name: Terraform Init (dev backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/dev/backend-dev.hcl

      # Apply the saved plan file — NOT -auto-approve, NOT a fresh plan.
      - name: Terraform Apply (dev)
        run: terraform apply -input=false -lock-timeout=120s tfplan

  # ---------------------------------------------------------------------------
  # 3) Promote to staging. The staging GitHub Environment has a required
  #    reviewer, so this job pauses for manual approval before it plans/applies.
  #    Uses its own remote-state backend and STAGING_DB_PASSWORD secret.
  # ---------------------------------------------------------------------------
  apply-staging:
    name: Apply (staging)
    runs-on: ubuntu-latest
    needs: apply-dev
    # Staging is promoted ONLY via manual workflow_dispatch (environment=staging),
    # never automatically on push. A push to main is a dev-only CD run that
    # concludes green after the smoke test, so consecutive merges never queue
    # behind an unresolved staging reviewer gate. The gate still protects the
    # staging GitHub Environment on the dispatch path. apply-dev is skipped on a
    # staging dispatch, so accept skipped too.
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' &&
      (needs.apply-dev.result == 'success' || needs.apply-dev.result == 'skipped')
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Assemble the real Lambda packages from Dev/src before plan (build/lambda
      # is gitignored and read by archive_file at plan time).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda packages
        run: bash scripts/package_lambdas.sh

      - name: Terraform Init (staging backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/staging/backend-staging.hcl

      - name: Terraform Plan (staging)
        run: terraform plan -input=false -lock-timeout=120s -var-file=envs/staging/staging.tfvars -out=tfplan

      # Apply the plan produced moments ago in this gated job (saved plan, not
      # -auto-approve). The single approval above gates the whole job.
      - name: Terraform Apply (staging)
        run: terraform apply -input=false -lock-timeout=120s tfplan

  # ---------------------------------------------------------------------------
  # 4) Build the React SPA against the live dev API and publish it to the
  #    CloudFront-fronted S3 bucket. Runs after dev is applied so the API URL
  #    and bucket exist. No-op (skips gracefully) when enable_tls is false.
  # ---------------------------------------------------------------------------
  deploy-frontend-dev:
    name: Deploy frontend (dev)
    runs-on: ubuntu-latest
    needs: apply-dev
    if: github.event_name == 'push' || inputs.environment == 'dev'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Init only to read outputs (canonical_api_url, spa bucket, distribution).
      - name: Terraform Init (dev backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/dev/backend-dev.hcl

      - name: Build and publish SPA
        run: bash scripts/deploy_frontend.sh

  # ---------------------------------------------------------------------------
  # 5) Smoke test the live dev API end-to-end over HTTPS (health -> create ->
  #    get -> comment -> resolve -> webhook -> report). Fails the run if the
  #    real deployed app does not behave, catching packaging/route/IAM breaks
  #    that a plan cannot.
  # ---------------------------------------------------------------------------
  smoke-test-dev:
    name: Smoke test (dev)
    runs-on: ubuntu-latest
    needs: apply-dev
    if: github.event_name == 'push' || inputs.environment == 'dev'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init (dev backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/dev/backend-dev.hcl

      - name: Run smoke test
        run: bash scripts/smoke_test.sh
