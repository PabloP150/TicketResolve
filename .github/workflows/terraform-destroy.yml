name: Terraform Destroy (manual)

# Destructive by design — therefore workflow_dispatch ONLY. No push, no
# pull_request, no schedule trigger. An operator must launch it from the Actions
# UI and pick the environment.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - staging

concurrency:
  group: terraform-cd-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC federation (Delivery 5, Deliverable C)

defaults:
  run:
    working-directory: infra/

jobs:
  destroy:
    name: Destroy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    # Same GitHub Environment as apply, so destroying staging still requires the
    # configured reviewer to approve.
    environment: ${{ inputs.environment }}
    steps:
      # Checkout first: later steps use working-directory: infra/, which only
      # exists after the repo is checked out.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm target
        run: |
          echo "Destroying environment: ${{ inputs.environment }}"
          echo "Backend config: envs/${{ inputs.environment }}/backend-${{ inputs.environment }}.hcl"
          echo "Var file:       envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init (${{ inputs.environment }} backend)
        run: terraform init -input=false -lock-timeout=120s -backend-config=envs/${{ inputs.environment }}/backend-${{ inputs.environment }}.hcl

      # db_password defaults to "" and only feeds a Lambda env var that is being
      # destroyed here, so no secret injection is needed on the destroy path.
      - name: Terraform Destroy (${{ inputs.environment }})
        run: terraform destroy -auto-approve -input=false -lock-timeout=120s -var-file=envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars
